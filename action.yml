name: 'Sift — structural CI-log diff'
description: 'Diffs this run''s logs against the last green run on the base branch; posts one sticky PR comment + an advisory gate.'
author: 'CodeRoast'
branding:
  icon: 'git-pull-request'
  color: 'purple'

inputs:
  log:
    description: 'Path to the current run''s captured log to diff (the build/CI log). Required for mode comment|render; unused for mode post.'
    required: false
    # Override only. By default the Action downloads + sha256-verifies the
    # version-pinned `sift-linux-x64` release asset (resolve-sift.ts). Set this to
    # a path for a self-hosted runner / in-image build / Docker-bundle packaging.
  sift-binary:
    description: 'Override path to a `sift` binary. Default: download + verify the version-pinned linux-x64 release asset.'
    required: false
    default: 'sift'
  fail-on:
    description: 'Advisory gate: exit non-zero when the condition holds. One of none | significant | regression.'
    required: false
    default: 'none'
  build-status:
    description: 'Optional enhancer: the current run''s suite result (green | red | unknown). Set it from your build/test job result — green on success, else red (README shows the exact expression). Drives the green-build headline; degrades gracefully when unknown.'
    required: false
    default: 'unknown'
  github-token:
    description: 'Token for the runs/artifacts API, the sticky comment, and artifact upload.'
    required: false
    default: ${{ github.token }}
  mode:
    description: >-
      comment (default) — render + post the sticky comment inline (same-repo PRs,
      the proven path). render — render the escaped comment body to
      $RUNNER_TEMP/sift-comment/ WITHOUT posting (the unprivileged fork build job;
      the workflow uploads it as the `sift-comment` artifact). post — run no engine;
      download that artifact off the triggering run and post the comment (the
      privileged workflow_run job). See examples/fork-safe/. Leave unset (comment)
      unless you have wired the fork-comment topology.
    required: false
    default: 'comment'
  run-id:
    description: 'mode=post only: the triggering run id whose `sift-comment` artifact to post — the workflow_run event''s run id (see examples/fork-safe).'
    required: false
    default: ''
  build-workflow:
    description: 'mode=post only (optional): the expected build workflow (file name or display name) to double-check the triggering run against. The workflow_run trigger filter is the primary guard.'
    required: false
    default: ''

# Permissions the caller workflow must grant (contract § 6):
#   actions: read       — resolve the base branch's last green run + its artifact
#   contents: read      — checkout / API
#   pull-requests: write — post/update the sticky comment
#   actions: write      — upload this run's baseline-log artifact
# Fork PRs get a read-only token: the comment/artifact writes degrade with a
# warning (the advisory gate still applies).

runs:
  using: 'node20'
  main: 'dist/index.js'
