name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write   # Sift dogfood: comment on same-repo PRs + seed on push; fork PRs skipped (read-only token anyway)
      actions: write         # Sift dogfood: upload the baseline-log artifact (+ read for last-green resolution)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Start build-log capture (typecheck/test below append; Sift diffs it)
        run: truncate --size 0 "$GITHUB_WORKSPACE/build.log"

      - name: Typecheck
        run: npm run typecheck 2>&1 | tee -a "$GITHUB_WORKSPACE/build.log"

      - name: Test
        run: npm test 2>&1 | tee -a "$GITHUB_WORKSPACE/build.log"

      - name: dist/ is in sync with src/ (the committed bundle is what runs)
        # `runs: main: dist/index.js` — GitHub executes the COMMITTED bundle, not
        # src/. A stale dist silently ships old behaviour, so re-bundle and fail if
        # the committed dist differs. The #1 JS-action footgun; this gate kills it.
        run: |
          npm run package
          if ! git diff --quiet --exit-code dist/; then
            echo "::error::dist/ is stale — run 'npm run package' and commit dist/."
            git --no-pager diff --stat dist/
            exit 1
          fi

      - name: Sift — structural diff of this run's typecheck/test log (advisory, dogfoods THIS code)
        if: ${{ always() && github.event.pull_request.head.repo.fork != true }}
        continue-on-error: true    # advisory: a Sift error must NEVER fail this build
        uses: ./    # the local action (dist/ was just rebuilt above), NOT @v1 — so the PR's own code eats its dog food
        with:
          log: build.log
          fail-on: none
          commit-comment: regression
          build-status: ${{ job.status == 'success' && 'green' || 'red' }}

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          ./actionlint

  manifest-load:
    # actionlint lints WORKFLOWS, not action.yml — so a broken manifest (a ${{ }} expression
    # using a context invalid in action metadata, e.g. `needs` / `github.event`) ships silently
    # and fails EVERY consumer at `uses:`, which the TS suite can never catch. Force GitHub to
    # LOAD the manifest by self-using the action. On a non-PR event main.ts takes the no-PR path
    # (seed-only) and exits 0 — no engine, no binary, no comment. A manifest that won't load
    # fails this job at the `uses:` step. (PRs are covered by the push:main run after merge,
    # before the floating @v1 is re-pointed at the new commit.)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "manifest-load smoke" > smoke.log   # a real file for the required `log` input
      - uses: ./
        with:
          log: smoke.log
